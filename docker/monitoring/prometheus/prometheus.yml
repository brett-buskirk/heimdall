# =============================================================================
# Prometheus Configuration
# =============================================================================
# Scrapes metrics from all nodes in the VPC.
# Update instance labels and app-server targets to match your deployment.
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    project: your-project-name

# =============================================================================
# Alerting Configuration
# =============================================================================
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# =============================================================================
# Rule Files
# =============================================================================
rule_files:
  - /etc/prometheus/alerts.yml

# =============================================================================
# Scrape Configurations
# =============================================================================
scrape_configs:
  # ---------------------------------------------------------------------------
  # Prometheus Self-Monitoring
  # ---------------------------------------------------------------------------
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'management-node'

  # ---------------------------------------------------------------------------
  # Management Node - Node Exporter
  # ---------------------------------------------------------------------------
  - job_name: 'node-exporter-management'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          instance: 'management-node'
          role: 'management'

  # ---------------------------------------------------------------------------
  # Application Servers - Node Exporter
  # ---------------------------------------------------------------------------
  # These targets use VPC private IPs for secure internal communication.
  # Replace with your actual node VPC IPs after Terraform + Ansible deploy.
  # Get IPs from: terraform output  OR  doctl compute droplet list
  - job_name: 'node-exporter-apps'
    static_configs:
      # Application Server 1 — replace IP and labels with your own
      - targets: ['10.x.x.2:9100']
        labels:
          instance: 'app-server-1'
          role: 'webserver'

      # Application Server 2 — replace IP and labels with your own
      - targets: ['10.x.x.3:9100']
        labels:
          instance: 'app-server-2'
          role: 'appserver'

  # ---------------------------------------------------------------------------
  # Loki Metrics
  # ---------------------------------------------------------------------------
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
        labels:
          instance: 'management-node'

  # ---------------------------------------------------------------------------
  # Grafana Metrics
  # ---------------------------------------------------------------------------
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
        labels:
          instance: 'management-node'

  # ---------------------------------------------------------------------------
  # Alertmanager Metrics
  # ---------------------------------------------------------------------------
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
        labels:
          instance: 'management-node'

  # ---------------------------------------------------------------------------
  # Docker Container Metrics (Optional - via cAdvisor)
  # ---------------------------------------------------------------------------
  # Uncomment and add cAdvisor to docker-compose if you want container metrics
  # - job_name: 'cadvisor'
  #   static_configs:
  #     - targets: ['cadvisor:8080']
