# =============================================================================
# Grafana Dashboard Provisioning
# =============================================================================
# Auto-loads dashboards from the dashboards folder on startup
# =============================================================================

apiVersion: 1

providers:
  - name: 'Infrastructure'
    orgId: 1
    folder: 'Infrastructure'
    folderUid: heimdall-infra
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
