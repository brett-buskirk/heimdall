# =============================================================================
# Alertmanager Configuration
# =============================================================================
# Routes alerts to email (and optionally Slack/Discord)
# =============================================================================

global:
  # SMTP configuration for email alerts
  # Update these values in docker-compose.yml environment or use a .env file
  smtp_smarthost: 'smtp.mailgun.org:587'  # Or your preferred SMTP provider
  smtp_from: 'alerts@rcjourney.cloud'
  smtp_auth_username: ''  # Set via environment variable
  smtp_auth_password: ''  # Set via environment variable
  smtp_require_tls: true

  # How long to wait before sending a notification again
  resolve_timeout: 5m

# =============================================================================
# Alert Routing
# =============================================================================
route:
  # Default receiver
  receiver: 'email-alerts'
  
  # Group alerts by these labels
  group_by: ['alertname', 'instance', 'severity']
  
  # How long to wait before sending the first notification
  group_wait: 30s
  
  # How long to wait before sending notifications for new alerts in a group
  group_interval: 5m
  
  # How long to wait before re-sending notifications
  repeat_interval: 4h

  # Route critical alerts immediately
  routes:
    - match:
        severity: critical
      receiver: 'email-critical'
      group_wait: 10s
      repeat_interval: 1h
    
    # Foundry-specific alerts get special treatment
    - match:
        service: foundry
      receiver: 'email-critical'
      group_wait: 10s
      repeat_interval: 30m

# =============================================================================
# Receivers
# =============================================================================
receivers:
  # Standard email alerts
  - name: 'email-alerts'
    email_configs:
      - to: 'alerts@rcjourney.cloud'
        send_resolved: true
        headers:
          Subject: '[RCJ-Infra] {{ .Status | toUpper }}: {{ .CommonLabels.alertname }}'
        html: |
          {{ range .Alerts }}
          <h3>{{ .Labels.alertname }}</h3>
          <p><b>Severity:</b> {{ .Labels.severity }}</p>
          <p><b>Instance:</b> {{ .Labels.instance }}</p>
          <p><b>Summary:</b> {{ .Annotations.summary }}</p>
          <p><b>Description:</b> {{ .Annotations.description }}</p>
          <hr>
          {{ end }}

  # Critical alerts with more urgency
  - name: 'email-critical'
    email_configs:
      - to: 'alerts@rcjourney.cloud'
        send_resolved: true
        headers:
          Subject: '🚨 [CRITICAL] {{ .CommonLabels.alertname }} on {{ .CommonLabels.instance }}'
        html: |
          <h2 style="color: red;">🚨 CRITICAL ALERT</h2>
          {{ range .Alerts }}
          <h3>{{ .Labels.alertname }}</h3>
          <p><b>Instance:</b> {{ .Labels.instance }}</p>
          <p><b>Summary:</b> {{ .Annotations.summary }}</p>
          <p><b>Description:</b> {{ .Annotations.description }}</p>
          <p><b>Started:</b> {{ .StartsAt.Format "2006-01-02 15:04:05 MST" }}</p>
          <hr>
          {{ end }}
          <p><a href="http://grafana.rcjourney.cloud">Open Grafana Dashboard</a></p>

  # Uncomment to add Slack notifications
  # - name: 'slack-critical'
  #   slack_configs:
  #     - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
  #       channel: '#alerts'
  #       send_resolved: true
  #       title: '{{ .Status | toUpper }}: {{ .CommonLabels.alertname }}'
  #       text: '{{ .CommonAnnotations.summary }}'

  # Uncomment to add Discord notifications (via webhook)
  # - name: 'discord-critical'
  #   webhook_configs:
  #     - url: 'https://discord.com/api/webhooks/YOUR/WEBHOOK/URL'
  #       send_resolved: true

# =============================================================================
# Inhibition Rules
# =============================================================================
# Prevent duplicate alerts when a more severe alert already fired
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
