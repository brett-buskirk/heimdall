name: Bug report
description: Something isn't working as expected
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this? Include relevant config or error output.
      placeholder: |
        1. Terraform/Ansible version: ...
        2. Variables set: ...
        3. Command run: ...
        4. Output / error seen: ...
    validations:
      required: true

  - type: dropdown
    id: layer
    attributes:
      label: Which layer does this affect?
      options:
        - Terraform
        - Ansible
        - Docker / monitoring stack
        - Documentation
        - CI / validation
        - Other
    validations:
      required: false

  - type: checkboxes
    id: duplicate
    attributes:
      label: Duplicate check
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
