# =============================================================================
# Promtail Extra Jobs — WordPress + Foundry VTT Overlay
# =============================================================================
# Add these jobs to your Promtail config on nodes that run WordPress or
# Foundry VTT. In the Ansible template (promtail-config.yml.j2) you can
# include these conditionally based on a host variable, e.g.:
#
#   # In your inventory or host_vars:
#   promtail_extra_jobs:
#     - wordpress   # on WP nodes
#     - foundry     # on Foundry nodes
#
# Then in promtail-config.yml.j2:
#   {% if 'wordpress' in (promtail_extra_jobs | default([])) %}
#   {{ lookup('file', 'examples/wordpress-foundry/promtail-extra-jobs.yml') }}
#   {% endif %}
# =============================================================================

