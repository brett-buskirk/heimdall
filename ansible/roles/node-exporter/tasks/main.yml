# =============================================================================
# Node Exporter Role - Deploy to Application Servers
# =============================================================================
# Installs node_exporter as a systemd service for host metrics collection
# =============================================================================
---
- name: Check if node_exporter is installed
  ansible.builtin.stat:
    path: /usr/local/bin/node_exporter
  register: node_exporter_binary

# Version is pinned in defaults/main.yml (node_exporter_version), matching the
# docker-compose image. Override per-deploy with -e if you need a different build.
- name: Download node_exporter
  ansible.builtin.unarchive:
    src: >-
      https://github.com/prometheus/node_exporter/releases/download/v{{
      node_exporter_version }}/node_exporter-{{ node_exporter_version
      }}.linux-amd64.tar.gz
    dest: /tmp
    remote_src: true
  when: not node_exporter_binary.stat.exists

- name: Install node_exporter binary
  ansible.builtin.copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
    dest: /usr/local/bin/node_exporter
    remote_src: true
    mode: "0755"
    owner: root
    group: root
  when: not node_exporter_binary.stat.exists
  notify: Restart node_exporter

- name: Create node_exporter user
  ansible.builtin.user:
    name: node_exporter
    system: true
    shell: /bin/false
    create_home: false

- name: Create node_exporter systemd service
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Node Exporter
      Wants=network-online.target
      After=network-online.target

      [Service]
      User=node_exporter
      Group=node_exporter
      Type=simple
      ExecStart=/usr/local/bin/node_exporter \
        --collector.filesystem.mount-points-exclude="^/(sys|proc|dev|host|etc)($$|/)" \
        --collector.netclass.ignored-devices="^(veth|docker|br-).*"
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/node_exporter.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart node_exporter

- name: Start and enable node_exporter
  ansible.builtin.systemd:
    name: node_exporter
    state: started
    enabled: true
    daemon_reload: true

# ansible_facts.packages is not populated by default fact gathering; without
# this, the ufw guard below evaluates 'ufw' in <undefined> and errors. This
# play runs no common/security role, so gather package facts here.
- name: Gather installed package facts
  ansible.builtin.package_facts:
    manager: auto

- name: Allow node_exporter through UFW (from VPC)
  community.general.ufw:
    rule: allow
    port: "9100"
    proto: tcp
    from_ip: "{{ vpc_cidr }}"
  when: "'ufw' in ansible_facts.packages"
  failed_when: false
