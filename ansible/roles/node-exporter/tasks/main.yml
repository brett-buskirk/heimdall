# =============================================================================
# Node Exporter Role - Deploy to Application Servers
# =============================================================================
# Installs node_exporter as a systemd service for host metrics collection
# =============================================================================
---
- name: Check if node_exporter is installed
  stat:
    path: /usr/local/bin/node_exporter
  register: node_exporter_binary

- name: Get latest node_exporter version
  uri:
    url: https://api.github.com/repos/prometheus/node_exporter/releases/latest
    return_content: yes
  register: node_exporter_latest
  when: not node_exporter_binary.stat.exists

- name: Set node_exporter version
  set_fact:
    node_exporter_version: "{{ node_exporter_latest.json.tag_name | regex_replace('^v', '') }}"
  when: not node_exporter_binary.stat.exists

- name: Download node_exporter
  unarchive:
    src: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
    dest: /tmp
    remote_src: yes
  when: not node_exporter_binary.stat.exists

- name: Install node_exporter binary
  copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
    dest: /usr/local/bin/node_exporter
    remote_src: yes
    mode: '0755'
    owner: root
    group: root
  when: not node_exporter_binary.stat.exists
  notify: Restart node_exporter

- name: Create node_exporter user
  user:
    name: node_exporter
    system: yes
    shell: /bin/false
    create_home: no

- name: Create node_exporter systemd service
  copy:
    content: |
      [Unit]
      Description=Node Exporter
      Wants=network-online.target
      After=network-online.target

      [Service]
      User=node_exporter
      Group=node_exporter
      Type=simple
      ExecStart=/usr/local/bin/node_exporter \
        --collector.filesystem.mount-points-exclude="^/(sys|proc|dev|host|etc)($$|/)" \
        --collector.netclass.ignored-devices="^(veth|docker|br-).*"
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/node_exporter.service
    mode: '0644'
  notify:
    - Reload systemd
    - Restart node_exporter

- name: Start and enable node_exporter
  systemd:
    name: node_exporter
    state: started
    enabled: yes
    daemon_reload: yes

- name: Allow node_exporter through UFW (from VPC)
  ufw:
    rule: allow
    port: '9100'
    proto: tcp
    from_ip: "{{ vpc_cidr | default('10.108.0.0/20') }}"
  when: "'ufw' in ansible_facts.packages"
  ignore_errors: yes

# Handlers
- name: Reload systemd
  systemd:
    daemon_reload: yes
  listen: Reload systemd

- name: Restart node_exporter
  systemd:
    name: node_exporter
    state: restarted
  listen: Restart node_exporter
