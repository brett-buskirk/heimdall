# =============================================================================
# Docker Role - Install Docker and Docker Compose
# =============================================================================
---
- name: Check if Docker is installed
  ansible.builtin.command: docker --version
  register: docker_installed
  ignore_errors: true
  changed_when: false

- name: Install Docker using convenience script
  when: docker_installed.rc != 0
  block:
    - name: Download Docker installation script
      ansible.builtin.get_url:
        url: https://get.docker.com
        dest: /tmp/get-docker.sh
        mode: "0755"

    - name: Run Docker installation script
      ansible.builtin.command: /tmp/get-docker.sh
      args:
        creates: /usr/bin/docker

    - name: Remove installation script
      ansible.builtin.file:
        path: /tmp/get-docker.sh
        state: absent

- name: Ensure Docker service is started and enabled
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true
  when: ansible_user != 'root'

- name: Install Docker Compose plugin
  ansible.builtin.apt:
    name: docker-compose-plugin
    state: present
  failed_when: false

# Fallback: Install Docker Compose standalone if plugin not available
- name: Check for Docker Compose
  ansible.builtin.command: docker compose version
  register: docker_compose_check
  failed_when: false
  changed_when: false

- name: Install Docker Compose standalone (fallback)
  when: docker_compose_check.rc != 0
  block:
    - name: Download Docker Compose
      ansible.builtin.get_url:
        url: "https://github.com/docker/compose/releases/download/v{{ docker_compose_version | default('2.24.0') }}/docker-compose-linux-x86_64"
        dest: /usr/local/bin/docker-compose
        mode: "0755"

    - name: Create symlink for docker compose command
      ansible.builtin.file:
        src: /usr/local/bin/docker-compose
        dest: /usr/bin/docker-compose
        state: link

- name: Configure Docker daemon
  ansible.builtin.copy:
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        },
        "storage-driver": "overlay2"
      }
    dest: /etc/docker/daemon.json
    mode: "0644"
  notify: Restart Docker

# Force the Docker restart to happen here, before the monitoring stack is
# deployed. Docker 29+ installs default to the containerd image store; writing
# daemon.json (classic storage-driver) and restarting flips the store, which
# orphans any images/containers created beforehand. If the restart ran at the
# usual end-of-play handler flush, it would wipe the already-running stack.
# Flushing now settles the daemon on its final store before anything is pulled.
- name: Flush handlers so the Docker daemon settles before the stack deploys
  ansible.builtin.meta: flush_handlers
