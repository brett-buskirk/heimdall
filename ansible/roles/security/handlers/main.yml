# =============================================================================
# Security Role - Handlers
# =============================================================================
---
# The SSH service unit is named "ssh" on Debian/Ubuntu (this stack is
# apt/ufw-based, so Ubuntu-only); "sshd" is the RHEL name and fails here.
- name: Restart SSH
  ansible.builtin.systemd:
    name: ssh
    state: restarted

- name: Restart fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: restarted
