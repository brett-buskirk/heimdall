---
# =============================================================================
# Ansible Inventory - Manual Configuration
# =============================================================================
# Use this file for your first run, or when not using Terraform.
# After terraform apply, use the auto-generated inventory/production.yml instead.
#
# Replace all placeholder values (CAPS) with your actual IPs/hostnames.
# =============================================================================

all:
  children:
    management:
      hosts:
        # Replace with <project_name>-management after terraform apply
        management-node:
          ansible_host: MANAGEMENT_NODE_PUBLIC_IP
          private_ip: MANAGEMENT_NODE_PRIVATE_IP
          ansible_user: root
          ansible_python_interpreter: /usr/bin/python3

    application_servers:
      # Add your monitored servers here (uncomment and populate):
      # my-app-server:
      #   ansible_host: YOUR_SERVER_PUBLIC_IP
      #   private_ip: YOUR_SERVER_PRIVATE_IP
      #   ansible_user: root
      #   ansible_python_interpreter: /usr/bin/python3
      hosts: {}

  vars:
    prometheus_server: MANAGEMENT_NODE_PRIVATE_IP
    loki_server: MANAGEMENT_NODE_PRIVATE_IP
