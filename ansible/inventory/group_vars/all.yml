---
# =============================================================================
# Ansible Group Variables - All Hosts
# =============================================================================
# REQUIRED before running any playbook:
#   project_name        — must match terraform.tfvars
#   vpc_cidr            — your VPC CIDR block (doctl vpcs list)
#   grafana_admin_password — set a strong password; the playbook fails without it
#
# REQUIRED before running deploy-agents.yml:
#   loki_server         — management node VPC private IP (terraform output)
#   prometheus_server   — management node VPC private IP (terraform output)
# =============================================================================

# -----------------------------------------------------------------------------
# Project (REQUIRED — must match the value set in terraform.tfvars)
# -----------------------------------------------------------------------------
project_name: "your-project-name"

# -----------------------------------------------------------------------------
# Environment
# -----------------------------------------------------------------------------
deploy_environment: production
timezone: America/New_York

# -----------------------------------------------------------------------------
# VPC Configuration (REQUIRED — set to your VPC's CIDR block)
# -----------------------------------------------------------------------------
# Find your VPC CIDR in the DigitalOcean console or via:
#   doctl vpcs list
vpc_cidr: "10.x.x.x/xx"

# -----------------------------------------------------------------------------
# Monitoring Configuration
# -----------------------------------------------------------------------------
project_dir: "/opt/{{ project_name }}-monitoring"
grafana_admin_user: admin
grafana_admin_password: "CHANGE_ME"       # REQUIRED — set before running the playbook
grafana_root_url: "http://localhost:3000" # Update to your Tailscale hostname or domain

# Alert configuration
alert_email: "alerts@yourdomain.com" # Update to your alert destination

# SMTP Configuration (for email alerts — uncomment and configure to enable)
# smtp_host: "smtp.mailgun.org:587"
# smtp_user: ""
# smtp_password: ""

# -----------------------------------------------------------------------------
# Management Node (auto-populated from Terraform inventory when using production.yml)
# -----------------------------------------------------------------------------
loki_server: "10.x.x.x" # Set to management node VPC IP after terraform output
prometheus_server: "10.x.x.x" # Set to management node VPC IP after terraform output
