# =============================================================================
# Management Node Setup Playbook
# =============================================================================
# Sets up the monitoring stack on the management node.
#
# Usage:
#   ansible-playbook -i inventory/production.yml playbooks/management-node.yml
# =============================================================================
---
- name: Configure Management Node
  hosts: management
  become: true

  vars:
    docker_compose_version: "2.24.0"

  roles:
    - common
    - security
    - docker
    - monitoring-stack

  post_tasks:
    - name: Display access information
      ansible.builtin.debug:
        msg: |
          ═══════════════════════════════════════════════════════════
          Management Node Setup Complete — {{ project_name }}
          ═══════════════════════════════════════════════════════════

          Grafana:      http://{{ ansible_host }}:3000
          Prometheus:   http://{{ ansible_host }}:9090
          Alertmanager: http://{{ ansible_host }}:9093

          Default Grafana credentials:
            Username: {{ grafana_admin_user | default('admin') }}
            Password: (set in {{ project_dir }}/.env)

          Next steps:
          1. Set up Tailscale for secure remote access
          2. Run the agent deployment playbook on your app servers
          3. Check Grafana — dashboards are provisioned automatically

          ═══════════════════════════════════════════════════════════
