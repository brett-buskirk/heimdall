# =============================================================================
# Agent Deployment Playbook
# =============================================================================
# Deploys node_exporter and Promtail to application servers for metrics
# and log collection.
#
# Usage:
#   ansible-playbook -i inventory/production.yml playbooks/deploy-agents.yml
#
# Or for specific hosts:
#   ansible-playbook -i inventory/production.yml playbooks/deploy-agents.yml --limit rc-journey-wp
# =============================================================================
---
- name: Deploy Monitoring Agents
  hosts: application_servers
  become: true
  
  vars:
    loki_url: "http://{{ loki_server }}:3100/loki/api/v1/push"
  
  roles:
    - node-exporter
    - promtail-agent

  post_tasks:
    - name: Display agent status
      debug:
        msg: |
          ═══════════════════════════════════════════════════════════
          🔍 Monitoring Agents Deployed on {{ inventory_hostname }}
          ═══════════════════════════════════════════════════════════
          
          Node Exporter: http://{{ ansible_host }}:9100/metrics
          Promtail:      Shipping logs to {{ loki_url }}
          
          Verify in Prometheus:
            up{instance="{{ inventory_hostname }}"}
          
          ═══════════════════════════════════════════════════════════
